<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories 💜</title>

<link rel="stylesheet" href="style.css">

<style>

body{

margin:0;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

background:linear-gradient(-45deg,#ffb3ec,#d7a6ff,#ff9fd6,#c58cff);

background-size:400% 400%;

animation:bg 12s ease infinite;

font-family:Poppins,sans-serif;

}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.card{

width:92%;

max-width:430px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

border-radius:30px;

padding:25px;

text-align:center;

box-shadow:0 0 30px rgba(255,255,255,.35);

}

h1{

color:white;

font-size:28px;

text-shadow:

0 0 10px white,

0 0 20px hotpink,

0 0 35px violet;

animation:pop 1.4s;

}

@keyframes pop{

0%{

transform:scale(.6);

opacity:0;

}

100%{

transform:scale(1);

opacity:1;

}

}

.wall{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

margin-top:20px;

}

.photo{

height:120px;

border-radius:18px;

overflow:hidden;

opacity:0;

transform:scale(.8);

animation:appear .8s forwards;

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

}

.photo:nth-child(1){animation-delay:1s;}
.photo:nth-child(2){animation-delay:2s;}
.photo:nth-child(3){animation-delay:3s;}
.photo:nth-child(4){animation-delay:4s;}
.photo:nth-child(5){animation-delay:5s;}
.photo:nth-child(6){animation-delay:6s;}

@keyframes appear{

to{

opacity:1;

transform:scale(1);

}

}

.next{

margin-top:25px;

font-size:18px;

color:white;

text-shadow:0 0 10px white;

opacity:0;

animation:fadeIn 2s forwards;

animation-delay:7s;

}

@keyframes fadeIn{

to{

opacity:1;

}

}

</style>

</head>

<body>

<div class="card">

<h1>
💜 Do you remember our times together, my teetee? 🩷
</h1>

<div class="wall">

<div class="photo"><img src="assets/photo1.jpg"></div>

<div class="photo"><img src="assets/photo2.jpg"></div>

<div class="photo"><img src="assets/photo3.jpg"></div>

<div class="photo"><img src="assets/photo4.jpg"></div>

<div class="photo"><img src="assets/photo5.jpg"></div>

<div class="photo"><img src="assets/photo6.jpg"></div>

</div>

<p class="next">

✨ Tap anywhere to go to the next page ✨

</p>

<script>
  let tapped = false;

document.body.addEventListener("click", function () {

    if (tapped) return;

    tapped = true;

    document.body.style.transition = "opacity 1s ease";
    document.body.style.opacity = "0";

    setTimeout(function () {
        window.location.href = "page5.html";
    }, 1000);

});
  </script>

</body>
</html>
